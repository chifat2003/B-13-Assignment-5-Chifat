<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="flex min-h-screen items-center justify-center bg-gray-50">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <!-- <legend class="fieldset-legend">Login</legend> -->

            
            <div class="text-center text-2xl font-bold mb-4">
                <img src="./assets/github-logo.png" alt="github-logo" class="w-16 h-16 mx-auto mb-4" />
                <h2 class="text-2xl font-semibold ">GitHub Issues Tracker</h2>
                <p class="text-xs font-normal">Sign in to manage your issues</p>
            </div>

            <label class="label font-semibold">User Name</label>
            <input type="text" class="input" id="username" placeholder="User Name" />
            <p class="text-xs text-blue-600 mt-1">Default: admin</p>

            <label class="label font-semibold">Password</label>
            <input type="password" class="input" id="password" placeholder="Password" />
            <p class="text-xs text-blue-600 mt-1">Default: admin123</p>

            <button id="sign-in" class="btn bg-blue-800 border-0 btn-neutral mt-4">Sign In</button>
        </fieldset>
    </div>

    <script src="./login.js"></script>
</body>

</html>
